name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Next.js demo
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
      JWT_SECRET: ci-only-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare database schema
        run: npx prisma db push

      - name: Build
        run: npm run build
